server:
  port: 8082

spring:
  application:
    name: doctor-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081
          jwk-set-uri: http://localhost:8081/sso-auth-server/.well-known/jwks.json

  # Database (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3307/a_doctordb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      # FIX: Changed from 'update' to 'update' (keeping update) but disabled Flyway.
      # Flyway was enabled with 'baseline-on-migrate: true' but NO migration scripts exist,
      # causing startup failure: "Found non-empty schema without schema history table".
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # FIX: Disabled Flyway — no migration scripts exist in the project.
  flyway:
    enabled: false

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Logging for Debugging
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO
