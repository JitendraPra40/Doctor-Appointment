server:
  port: 8082

spring:
  application:
    name: doctor-service

  security:
    oauth2:
      resourceserver:
        jwt:
          # IMPORTANT: This MUST match the 'iss' claim in your JWT exactly.
          # If your Auth server is on 9000, keep it 9000.
          # If port 8081 is your Auth server, change this to 8081.
          issuer-uri: http://localhost:8081
          # Use this if auto-discovery fails or if using a custom port
          jwk-set-uri: http://localhost:8081/sso-auth-server/.well-known/jwks.json

  # Database (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/a_doctordb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Logging for Debugging
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO