server.port=8083
spring.application.name=patient-service

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/a_patientdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# ── Security ──────────────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.kafkaPublisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublisher.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.kafkaPublisher.register-health-indicator=true
resilience4j.retry.instances.kafkaPublisher.max-attempts=3
resilience4j.retry.instances.kafkaPublisher.wait-duration=500ms

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,circuitbreakers,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.app.patient_service=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.file.name=logs/patient-service.log
