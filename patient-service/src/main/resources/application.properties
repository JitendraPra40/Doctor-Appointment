# ===============================
# Server
# ===============================
server.port=8083

# ===============================
# Application
# ===============================
spring.application.name=patient-service

# ===============================
# Database (MySQL) — was PostgreSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/a_patientdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Flyway — disabled (no migration scripts)
# ===============================
spring.flyway.enabled=false

# ===============================
# OAuth2 / JWT Resource Server
# ===============================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ===============================
# Eureka Client
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
