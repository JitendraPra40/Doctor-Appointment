spring.mail.password=qwkl fdcy dfzk lgtb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# Trust all event packages from all services
spring.kafka.consumer.properties.spring.json.trusted.packages=com.app.appointment_service.event,com.app.payment_service.event,com.app.notification_service.event

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.jersey.enabled=false

# ── Resilience4j — resilient email sending ───────────────────────────────────
# Circuit breaker: open after 50% failures in a 10-call window, wait 30s
resilience4j.circuitbreaker.instances.emailSender.sliding-window-size=10
resilience4j.circuitbreaker.instances.emailSender.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.emailSender.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.emailSender.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.emailSender.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.emailSender.register-health-indicator=true
# Retry: try sending email 3 times with 2s wait before giving up
resilience4j.retry.instances.emailSender.max-attempts=3
resilience4j.retry.instances.emailSender.wait-duration=2s

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,circuitbreakers,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.app.notification_service=DEBUG
logging.level.io.github.resilience4j=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.file.name=logs/notification-service.log



