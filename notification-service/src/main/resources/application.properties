# ===============================
# Server
# ===============================
server.port=8086

# ===============================
# Application
# ===============================
spring.application.name=notification-service

# ===============================
# Kafka
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

# FIX: Added deserializer config so Kafka can deserialize AppointmentEvent and PaymentEvent
# records sent by other services as JSON.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.app.notification_service.dto,com.app.appointment_service.dto,com.app.payment_service.dto
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# ===============================
# Mail (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jitendra.pra40@gmail.com
spring.mail.password=qwkl fdcy dfzk lgtb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# Eureka Client
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===============================
# FIX: Disable Jersey-based Eureka transport
# Forces Eureka to use httpclient5 instead of Jersey.
# Without this, Eureka tries to find TransportClientFactories (Jersey bean)
# and fails with NoSuchBeanDefinitionException.
# ===============================
eureka.client.jersey.enabled=false