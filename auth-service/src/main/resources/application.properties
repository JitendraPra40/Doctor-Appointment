spring.mail.password=qwkl fdcy dfzk lgtb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------- JPA / Hibernate ----------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------------- Redis ----------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------------- OAuth2 Resource Server --------------------
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ---------------- Eureka Client ----------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ---------------- JWT Expiration ----------------
jwt.access.expiration=900000
jwt.refresh.expiration=604800000

# ---------------- Twilio ----------------
twilio.account-sid=AC0212b8bfa817d80c9f51992982771335
twilio.auth-token=b85e5566191703c2f423f514370b5eb9
twilio.phone-number=+14352928634

# ---------------- Resilience4j Circuit Breaker ----------------
resilience4j.circuitbreaker.instances.emailSender.sliding-window-size=10
resilience4j.circuitbreaker.instances.emailSender.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.emailSender.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.emailSender.register-health-indicator=true

resilience4j.circuitbreaker.instances.redisOtp.sliding-window-size=5
resilience4j.circuitbreaker.instances.redisOtp.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.redisOtp.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.redisOtp.register-health-indicator=true

# ---------------- Resilience4j Retry ----------------
resilience4j.retry.instances.emailSender.max-attempts=3
resilience4j.retry.instances.emailSender.wait-duration=2s

# ---------------- Actuator ----------------
management.endpoints.web.exposure.include=health,info,circuitbreakers,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ---------------- Swagger / OpenAPI ----------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---------------- Logging ----------------
logging.level.com.app.auth_service=DEBUG
logging.level.org.springframework.security=WARN
logging.level.io.github.resilience4j=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n

logging.file.name=logs/auth-service.log