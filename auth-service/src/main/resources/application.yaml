# Server
server:
  port: 8081

# Application
spring:
  application:
    name: auth-service

  # Database (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3307/a_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Gmail SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: jitendra.pra40@gmail.com
    password: qwkl fdcy dfzk lgtb
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # JPA / Hibernate
  jpa:
    hibernate:
      # FIX: 'update' for local dev — 'validate' requires pre-existing schema with Flyway migrations
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # FIX: This service IS the auth/JWT issuer, not a resource server itself.
  # The oauth2 resource server config below is so auth-service can also validate
  # its own tokens if needed (e.g. for the /refresh endpoint protection).
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/sso-auth-server/.well-known/jwks.json

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Token Expiration time
jwt:
  access:
    expiration: 900000        # 15 minutes in ms
  refresh:
    expiration: 604800000     # 7 days in ms

# Twilio — set these as environment variables
twilio:
  account-sid: AC0212b8bfa817d80c9f51992982771335
  auth-token: b85e5566191703c2f423f514370b5eb9
  phone-number: +14352928634

# ── Resilience4j (for Redis OTP and email sending) ───────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      emailSender:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        register-health-indicator: true
      redisOtp:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        register-health-indicator: true
  retry:
    instances:
      emailSender:
        max-attempts: 3
        wait-duration: 2s

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging / SLF4J ────────────────────────────────────────────────────────
logging:
  level:
    com.app.auth_service: DEBUG
    org.springframework.security: WARN
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  file:
    name: logs/auth-service.log
