server.port=8085
spring.application.name=payment-service

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/a_paymentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-saga-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.app.appointment_service.event,com.app.payment_service.event

# ── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key-id=rzp_test_Rum74EhKGBoPZd
razorpay.key-secret=5BVhhlbxKnb7DmuzFjj9ekCZ
razorpay.webhook-secret=test_webhook_secret_2026

# ── Security ──────────────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Resilience4j ─────────────────────────────────────────────────────────────
# Circuit breaker for Kafka publish
resilience4j.circuitbreaker.instances.kafkaPublisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublisher.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.kafkaPublisher.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.kafkaPublisher.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.kafkaPublisher.register-health-indicator=true

# Circuit breaker for Razorpay API calls
resilience4j.circuitbreaker.instances.razorpayClient.sliding-window-size=5
resilience4j.circuitbreaker.instances.razorpayClient.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.razorpayClient.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.razorpayClient.register-health-indicator=true

# Retry for Razorpay (3 attempts, exponential backoff)
resilience4j.retry.instances.razorpayClient.max-attempts=3
resilience4j.retry.instances.razorpayClient.wait-duration=1s
resilience4j.retry.instances.razorpayClient.enable-exponential-backoff=true
resilience4j.retry.instances.razorpayClient.exponential-backoff-multiplier=2

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.app.payment_service=DEBUG
logging.level.io.github.resilience4j=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.file.name=logs/payment-service.log
