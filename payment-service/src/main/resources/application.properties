# ===============================
# Server
# ===============================
server.port=8085

# ===============================
# Application
# ===============================
spring.application.name=payment-service

# ===============================
# Database (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/a_paymentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# NOTE: hibernate.dialect removed — Hibernate 6 auto-detects MySQL dialect

# ===============================
# Flyway — disabled (no migration scripts)
# ===============================
spring.flyway.enabled=false

# ===============================
# Kafka
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ===============================
# Razorpay
# FIX: Added BOTH dash and dot variants to match whichever your RazorpayService uses.
# Your RazorpayService uses ${razorpay.key-id} (dash) — these are the correct keys.
# ===============================
razorpay.key-id=rzp_test_Rum74EhKGBoPZd
razorpay.key-secret=5BVhhlbxKnb7DmuzFjj9ekCZ
razorpay.webhook-secret=test_webhook_secret_2026

# Also keep dot-notation as fallback (used in our PaymentService)
razorpay.key.id=rzp_test_Rum74EhKGBoPZd
razorpay.key.secret=5BVhhlbxKnb7DmuzFjj9ekCZ
razorpay.webhook.secret=test_webhook_secret_2026

# ===============================
# OAuth2 / JWT Resource Server
# ===============================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ===============================
# Eureka Client
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/