server.port=8080
spring.application.name=API-GATEWAY
spring.main.web-application-type=reactive

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO
logging.level.org.springframework.cloud.loadbalancer=INFO

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT validation at gateway
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# FIX: Renamed deprecated keys → new spring-cloud-gateway-server-webflux property paths
# OLD (deprecated): spring.cloud.gateway.discovery.locator.enabled
# NEW:
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

