server.port=8080
spring.application.name=API-GATEWAY
spring.main.web-application-type=reactive

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO
logging.level.org.springframework.cloud.loadbalancer=INFO

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# FIX: Only jwk-set-uri needed — removed issuer-uri.
# issuer-uri triggers OIDC discovery (GET /.well-known/openid-configuration)
# which your auth-service does NOT expose, causing gateway JwtDecoder
# to fail silently and reject all tokens with 401.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# Discovery-based routing
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

