# ===============================
# Server
# ===============================
server.port=8080
spring.application.name=API-GATEWAY

# ===============================
# WebFlux (IMPORTANT)
# ===============================
spring.main.web-application-type=reactive

# ===============================
# Logging (very helpful)
# ===============================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO
logging.level.org.springframework.cloud.loadbalancer=INFO

# ===============================
# Eureka (ONLY if you are using it)
# ===============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/




# ===============================
# Security (ONLY if JWT is enabled)
# ===============================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/.well-known/jwks.json
