server.port=8080
spring.application.name=API-GATEWAY
spring.main.web-application-type=reactive

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO
logging.level.io.github.resilience4j=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.file.name=logs/gateway.log

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── JWT ───────────────────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ── Gateway routing ───────────────────────────────────────────────────────────
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# ── Resilience4j Circuit Breaker on Gateway routes ───────────────────────────
resilience4j.circuitbreaker.instances.authService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.authService.register-health-indicator=true

resilience4j.circuitbreaker.instances.doctorService.sliding-window-size=10
resilience4j.circuitbreaker.instances.doctorService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.doctorService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.doctorService.register-health-indicator=true

resilience4j.circuitbreaker.instances.patientService.sliding-window-size=10
resilience4j.circuitbreaker.instances.patientService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.patientService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.patientService.register-health-indicator=true

resilience4j.circuitbreaker.instances.appointmentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.appointmentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.appointmentService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.appointmentService.register-health-indicator=true

resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.paymentService.register-health-indicator=true

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents,gateway
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Swagger Aggregator ────────────────────────────────────────────────────────
# Gateway aggregates Swagger docs from ALL services into ONE unified Swagger UI
# Access at: http://localhost:8080/swagger-ui.html
# Use the top-right dropdown to switch between services
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].url=/auth-service/api-docs
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[1].url=/doctor-service/api-docs
springdoc.swagger-ui.urls[1].name=Doctor Service
springdoc.swagger-ui.urls[2].url=/patient-service/api-docs
springdoc.swagger-ui.urls[2].name=Patient Service
springdoc.swagger-ui.urls[3].url=/appointment-service/api-docs
springdoc.swagger-ui.urls[3].name=Appointment Service
springdoc.swagger-ui.urls[4].url=/payment-service/api-docs
springdoc.swagger-ui.urls[4].name=Payment Service
springdoc.api-docs.enabled=true
