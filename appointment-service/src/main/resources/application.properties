server.port=8084
spring.application.name=appointment-service

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/a_appointmentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ── Security ──────────────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/sso-auth-server/.well-known/jwks.json

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Resilience4j Circuit Breaker ─────────────────────────────────────────────
# Circuit breaker for Kafka publish calls (if Kafka is unavailable, fall back gracefully)
resilience4j.circuitbreaker.instances.kafkaPublisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublisher.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.kafkaPublisher.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.kafkaPublisher.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.kafkaPublisher.register-health-indicator=true

# Retry config: retry Kafka publish up to 3 times with 500ms wait
resilience4j.retry.instances.kafkaPublisher.max-attempts=3
resilience4j.retry.instances.kafkaPublisher.wait-duration=500ms

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── SLF4J / Logging ──────────────────────────────────────────────────────────
logging.level.com.app.appointment_service=DEBUG
logging.level.org.springframework.security=WARN
logging.level.io.github.resilience4j=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n
logging.file.name=logs/appointment-service.log
