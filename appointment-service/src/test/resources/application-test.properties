# ─────────────────────────────────────────────────────────────────────────────
# application-test.properties
# Place this in: src/test/resources/ of EACH service
# Activated by @ActiveProfiles("test") on integration test classes
# ─────────────────────────────────────────────────────────────────────────────

# ── In-memory H2 database (no MySQL needed for tests) ────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Disable Flyway in tests ───────────────────────────────────────────────────
spring.flyway.enabled=false

# ── Kafka: EmbeddedKafka overrides this automatically ────────────────────────
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=test-group

# ── Security: disable JWT validation in unit/slice tests ─────────────────────
# (For @WebMvcTest, override SecurityConfig with @TestConfiguration)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/test-jwks

# ── Eureka: disable in tests ──────────────────────────────────────────────────
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ── Logging: reduce noise in tests ───────────────────────────────────────────
logging.level.root=WARN
logging.level.com.app=DEBUG
logging.level.org.springframework.test=INFO

# ── Redis: use embedded/mock — disable auto-connect ──────────────────────────
spring.data.redis.repositories.enabled=false

# ── Resilience4j: disable in tests to avoid annotation conflicts ─────────────
resilience4j.circuitbreaker.instances.kafkaPublisher.sliding-window-size=5
resilience4j.circuitbreaker.instances.kafkaPublisher.failure-rate-threshold=100
resilience4j.retry.instances.kafkaPublisher.max-attempts=1
